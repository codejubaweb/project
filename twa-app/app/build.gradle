plugins {
    id 'com.android.application'
}
android {
    compileSdkVersion 33
    defaultConfig {
        applicationId "com.juba.editorpro"
        minSdkVersion 21
        targetSdkVersion 33
        versionCode 1
        versionName "11.0"
    }
    buildTypes {
        release {
            minifyEnabled false
        }
    }
    namespace "com.juba.editorpro"
}
dependencies {
    implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
