name: Build APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install & Build
        run: |
          npm install
          npm run build

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init TWA
        run: |
          bubblewrap init --manifest https://juba-editor-pro.vercel.app/manifest.json --directory twa

      - name: Build APK
        run: |
          cd twa
          bubblewrap build --skipPwaValidation

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: juba-apk
          path: twa/app-release-signed.apk
