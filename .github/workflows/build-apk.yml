name: Build APK
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android Licenses
        run: |
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Create TWA Project
        run: |
          mkdir -p twa-app/app/src/main/res/values

          cat > twa-app/settings.gradle << 'GRADLE'
include ':app'
GRADLE

          cat > twa-app/build.gradle << 'GRADLE'
buildscript {
    repositories { google(); mavenCentral() }
    dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
}
allprojects { repositories { google(); mavenCentral() } }
GRADLE

          cat > twa-app/gradle.properties << 'PROPS'
android.useAndroidX=true
android.enableJetifier=true
PROPS

          cat > twa-app/app/build.gradle << 'GRADLE'
plugins { id 'com.android.application' }
android {
    compileSdk 34
    defaultConfig {
        applicationId "com.juba.editorpro"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "11.0"
    }
    buildTypes { release { minifyEnabled false } }
    namespace "com.juba.editorpro"
}
dependencies {
    implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
}
GRADLE

          cat > twa-app/app/src/main/AndroidManifest.xml << 'MANIFEST'
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android">
    <application
        android:label="JUBA Editor Pro"
        android:theme="@style/Theme.LauncherActivity">
        <activity android:name="com.google.androidbrowserhelper.trusted.LauncherActivity">
            <meta-data android:name="android.support.customtabs.trusted.DEFAULT_URL"
                android:value="https://juba-editor-pro.vercel.app" />
            <intent-filter>
                <action android:name="android.intent.action.MAIN"/>
                <category android:name="android.intent.category.LAUNCHER"/>
            </intent-filter>
        </activity>
    </application>
</manifest>
MANIFEST

          cat > twa-app/app/src/main/res/values/styles.xml << 'STYLES'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <style name="Theme.LauncherActivity" parent="Theme.AppCompat.NoActionBar">
        <item name="android:windowBackground">@android:color/black</item>
    </style>
</resources>
STYLES

          cd twa-app && gradle wrapper --gradle-version=8.2

      - name: Build APK
        run: |
          cd twa-app
          ANDROID_SDK_ROOT=/usr/local/lib/android/sdk ./gradlew assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: juba-apk
          path: twa-app/app/build/outputs/apk/release/app-release-unsigned.apk
