name: Build APK
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Accept Licenses
        run: yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
      - name: Setup Gradle
        run: cd twa-app && gradle wrapper --gradle-version=8.2
      - name: Build APK
        run: cd twa-app && ANDROID_SDK_ROOT=/usr/local/lib/android/sdk ./gradlew assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: juba-apk
          path: twa-app/app/build/outputs/apk/release/app-release-unsigned.apk
